name: Ce vreu eu
on: 
    push:
        branches: 
            - main

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Dau si eu Deploy
              uses: appleboy/ssh-action@v1.0.3
              with:
                host: ${{ secrets.SERVER_HOST }}
                username: ${{ secrets.SERVER_USERNAME }}
                key: ${{ secrets.SSH_KEY }}
                port: 2222
                script: |
                    # 1. Clone or Pull the latest code
                    if [ -d "test" ]; then 
                        cd test
                        git pull origin main
                    else 
                        git clone https://github.com/georgiana-raluca-negru/test.git
                        cd test
                    fi

                    # 2. Set up the virtual environment and install packages
                    python3 -m venv .venv
                    source .venv/bin/activate
                    pip install fastapi uvicorn

                    # 3. Stop the old server if it is already running
                    pkill -f uvicorn || true

                    # 4. Start the new server in the background using nohup
                    # (This prevents the server from dying when the GitHub Action finishes)
                    nohup uvicorn main:app --host 0.0.0.0 --port 8000 > app.log 2>&1 &
                    
                    echo "Deploy completed successfully!"